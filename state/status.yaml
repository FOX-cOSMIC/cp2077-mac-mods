    310,915 -> 400 on an existing save, no reload, no crash. Mechanism is the
    LIVE-WRITE path (mach_vm_read_overwrite/mach_vm_write + structural/value scans via
    DoStatProbeCells, TWEAKXL_POKE_PROBE_CELLS=1), NOT the TweakDB-flat path (which
    remains walled per F-043/FA-016). Key model finding: derived/displayed stats
    (RAM cap 32, max HP 322) are computed from base+modifiers and NEVER materialized as
    their displayed value, so they are unreachable by value-scan (FA-017/18/19); STORED
    counters (money/components/XP) exist verbatim in memory and ARE writable+visible.
    The full TweakDB WRITE/CREATE/APPEND stack stays proven+verified at the engine''s
    own accessors (F-036/F-041/F-042) but does not propagate to gameplay on macOS.'
