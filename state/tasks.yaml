  - id: T-002b
    category: hook
    status: pending
    priority: P0
    owner: hook-engineer
    subject: Empirical slide-formula validation via exported function byte-compare
    description: |
      Per Scope's T-002 recommendation (Option C). Use F-004's slide formula
      and F-006's confirmation that the binary IS exported (not stripped) to
      pick an exported function with a known static address and prove the
      conversion empirically. Zero Ghidra dependency.

      Method:
      1. Pick an exported function. Scope suggested _AlignedMalloc at static
         0x100fa6e08. Verify with `nm` on the binary.
      2. Modify h001_probe.cpp (or write h002b_probe.cpp): at image-load time,
         compute runtime = static + slide. Read N bytes (16-32) at the runtime
         address via mach_vm_read_overwrite.
      3. Open the on-disk Mach-O at the corresponding file offset (static -
         load base = file offset for a function in __TEXT), read the same
         N bytes.
      4. Compare. Log match/mismatch with hex of both buffers.
      5. Lucas re-runs `tools/run-h001-probe.sh`. The byte-compare result
         either confirms F-004 (mark as F-NNN-confirmed) or falsifies it
         (file as FA-NNN with the discrepancy).

      Acceptance: F-NNN logged confirming F-004's slide formula, OR a FA-NNN
      explaining why the formula doesn't hold for this build.
    depends_on: []   # all prerequisites already met

