    description: |
      DONE 2026-05-29. Hookline shipped:
        - src/red4ext-mac/src/probes/h001_probe.cpp (8.5KB, C++17)
        - src/red4ext-mac/probes/CMakeLists.txt
        - tools/run-h001-probe.sh (executable launcher)
        - docs/probes/h001-probe.md

      Probe behavior: __attribute__((constructor)) at dylib load, registers
      _dyld_register_func_for_add_image callback, on Cyberpunk2077 image load
      logs base + slide + __TEXT bounds, then tries dlsym for four mangled
      TweakDB::Get() candidates. If singleton non-null: dumps 64 qwords with
      __TEXT-pointer detection (16 bytes raw at each). All speculative reads
      via mach_vm_read_overwrite — no crash on bad pointer.

      Dylib already built: build/src/red4ext-mac/libh001_probe.dylib
      (Mach-O arm64, 52KB).

      Hookline expects TweakDB singleton will be NULL at injection time
      (image-load is too early). Primary value of this run: confirm
      injection works + capture image base + slide for Ghidra correlation.

      NEXT: Lucas runs tools/run-h001-probe.sh, captures /tmp/h001-probe.log,
      hands to Scope. Then T-002 either resolves H-001 (if singleton became
      non-null) or motivates T-002b (hook construction point per H-003).
    depends_on: [T-001]

