      REFINED 2026-05-29 per T-002d follow-up.
      Last static-analysis prerequisite before mod-loader writes the
      flat-write code.

      TWO sub-questions, one Ghidra session:

      A. Disambiguate flats vs queries hash map (refines F-017):
         The struct has three identical hash maps at +0x58, +0x88, +0x108.
         +0x88 = records (F-012 confirmed). The other two are inferred
         per RED's declaration order to be flats (+0x58) and queries
         (+0x108), but this needs ONE concrete xref to confirm.

         Method:
         1. Find any GetFlat-like accessor — call site that reads from
            either +0x58 or +0x108.
         2. The accessor probably indexes into the flat-data-buffer at
            +0x148 with the entry's offset/index from the hash table.
         3. Record: which hash-map base offset (+0x58 or +0x108) is flats?
            What's the entry-to-buffer indexing scheme?

      B. Apply-mods trigger point (H-007):
         The constructor builds an EMPTY TweakDB. Where does the game
         populate it? When is "the DB is ready for mods" signal fired?

         Method:
         1. From global TweakDB* writes (xrefs to 0x1080c92d0), find
            the singleton init site. From there, trace forward.
         2. Look for symbol/string refs to TweakDBReloader, TweakDBResource,
            or .bin file loading.
         3. Identify the function called once population is complete —
            that's the hook target for mod-loader.

      Acceptance:
      - F-NNN — confirms flats hash-map offset (+0x58 vs +0x108) + entry
        → flat-value-buffer indexing scheme. Resolves the inferred part
        of F-017.
      - F-NNN — apply-trigger function with static address + signature.
        Resolves H-007.

