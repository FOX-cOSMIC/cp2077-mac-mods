      1. Find all #ifdef TWEAKXL_MAC_OFFLINE in reference/windows-tweakxl/
      2. Document what's stubbed and what's preserved
      3. Build a minimal test exercising just the parser path on macOS
      4. Decide: reuse psiberx source + flag, or write our own
      5. Record decision as a new ADR (D-005)

      Acceptance: A FACTS entry documenting what works under the flag, and
      either D-005 confirming reuse or a brief note explaining why we wrote
