    completed_by: cp2077-researcher (Scope, Opus 4.7, 14 min)
    subject: Ghidra xref hunt from F-008 anchors — identify TweakDB accessor + struct layout
    description: |
      REFINED 2026-05-29 — concrete addresses provided by F-008.
      UNBLOCKED — no longer waits on T-002b (Scope corrected dependency:
      static analysis needs no runtime validation).

      Anchor addresses (static):
      1. `0x1073bbea8` — emptyRecords static of GetRecords<Vehicle_Record>.
         Single xref → pins the const member function → struct layout.
         PRIMARY ENTRY POINT.
      2. `0x1073af788` — game::data::TweakDBID RTTI type-object pointer.
         Multi-referenced hub; writer is GetTypeObject<TweakDBID> or
         RegisterGameTweakDBRTTI.
      3. `0x1073eeab0` — RegisterGameTweakDBRTTI guard. Entry to type
         registration path.

      Method:
      1. In reference/ghidra/, locate function containing `0x1073bbea8`
         (likely `FUN_xxxx`). Identify its signature — it's
         GetRecords<Vehicle_Record>.
      2. Read the function: identify `this` pointer flow, member offsets
         accessed → determines TweakDB struct layout (folds in H-002).
      3. Look at xrefs INTO this function to find its callers — they
         pass the TweakDB singleton. Trace up to singleton initialization.
      4. From the RTTI type-object (anchor 2), find the constructor
         (xref to its writer) — identifies the singleton-init path.
      5. Identify candidate hook targets: TweakDB::Get (singleton
         accessor), TweakDB construction, flat-read functions.

      Acceptance:
      - F-NNN entries for the resolved function addresses
      - F-NNN with TweakDB struct layout (member offsets, sizes — H-002)
      - At minimum 1-2 viable hook targets for Hookline
      - H-005 resolved to F-NNN
      - H-002 resolved (folded in per Scope's recommendation)
    depends_on: []   # unblocked

  - id: T-002d
    category: research
    status: done
    priority: P0
    owner: researcher
    completed_at: 2026-05-29
    completed_by: cp2077-researcher (Scope, Opus 4.7, 9 min)
    subject: Disassemble TweakDB constructor FUN_102b73db8 — flats map (H-006) + vtable (F-014b)
    description: |
      Next critical static analysis after T-002c. The constructor at
      static 0x102b73db8 sets up the TweakDB struct after the initializer
      allocates 0x168 bytes. Two unknowns to resolve in one pass:

      1. **Flats map layout (resolves H-006).** The records map is at
         +0x88..+0xa4. The flats map is elsewhere within the 0x168 struct.
         Read constructor to find:
         - Flats map base offset
         - Bucket/entry/count fields
         - Storage scheme: hash table? array? function-pointer table?
           (This finally resolves H-001 for flats.)
      2. **VTable presence (informs F-014b).** Check if the constructor
         writes a vtable pointer at this+0x00. If yes: VTable hook is a
         viable approach; record the vtable static address. If no: rule
         out vtable hooks and stick with direct-data manipulation.

      Method:
      ```bash
      cd reference/ghidra
      L=$(grep -n -m1 '__text:102b73db8' Cyberpunk2077.txt | cut -d: -f1)
      awk -v s=$L -v e=$((L+200)) 'NR>=s&&NR<=e' Cyberpunk2077.txt
      ```
      Read disassembly, identify all `str xN, [x0, #+offset]` instructions
      where x0 is `this`.

      Acceptance:
      - F-NNN — Flats map layout (offsets, storage scheme). H-001 + H-006
        resolved.
      - F-NNN — VTable status (present/absent). F-014 hook approach
        finalized.
    depends_on: []

